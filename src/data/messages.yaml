set_critic: |
    use the following format:
    /set_critic [level] [subject] [triggers]

    - level: it is a number between 1 and 5, specifying the intensity of criticism by increasing the number
    - subject: the subject you want the bot to criticize
    - triggers: a list of words separated by "" or space to trigger the bot's process whenever it sees them

    example:
    /set_critic 4 "Sponge Bob" Patrik Sandy "Krusty krab" "Bikini Bottom"
    /set_critic 1 Dota2 game steam e-sport noob rage abandon

set_defender: |
    use the following format:
    /set_defender [level] [subject] [triggers]

    - level: it is a number between 1 and 5, specifying the intensity of defending by increasing the number
    - subject: the subject you want the bot to defend
    - triggers: a list of words separated by "" or space to trigger the bot's process whenever it sees them

    example:
    /set_defender 5 "Breaking Bad" Salamanca "Walter White" Chemistry "Jesse Pinkman" "Gus Fring" "Saul Goodman" 
    /set_defender 1 Hamburger foods "fast food" healthy fat Mcdonald 

invalid_level: level must be a number between 1 and 5!

set_successful: |
    entered data has been successfuly saved.

    subject:
    {subject}

    triggers:
    {triggers}

